<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OAM Partners — US Market Navigator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f4f5f7;padding:2rem 1rem}
.chat-wrap{background:#f4f5f7;border-radius:16px;padding:1.5rem;width:100%;max-width:620px;margin:0 auto}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid #e0e2e8}
.brand-dot{width:38px;height:38px;border-radius:50%;background:#2D3F6B;display:flex;align-items:center;justify-content:center;color:#C8D4F0;font-size:11px;font-weight:500;flex-shrink:0;letter-spacing:0.04em}
.brand-name{font-size:15px;font-weight:500;color:#1a1a2e}
.brand-sub{font-size:12px;color:#6b7280}
.messages{display:flex;flex-direction:column;gap:12px;margin-bottom:1rem;min-height:80px}
.msg{display:flex;gap:10px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;letter-spacing:0.03em}
.avatar.bot{background:#2D3F6B;color:#C8D4F0}
.avatar.user{background:#dbeafe;color:#1e40af}
.bubble{padding:10px 14px;border-radius:12px;font-size:16px;line-height:1.6;max-width:88%}
.bubble.bot{background:#ffffff;border:1px solid #e0e2e8;color:#1a1a2e;border-top-left-radius:4px}
.bubble.user{background:#2D3F6B;color:#E8EDF8;border-top-right-radius:4px}
.hint{font-size:13px;color:#6b7280;background:#eef0f5;border-left:2px solid #4A6399;padding:8px 10px;border-radius:0 6px 6px 0;margin:4px 0 2px;line-height:1.5;max-width:88%}
.choices{display:flex;flex-direction:column;gap:8px;margin-left:38px}
.choice-btn{padding:9px 14px;border:1px solid #4A6399;border-radius:8px;background:#ffffff;color:#2D3F6B;font-size:15px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;cursor:pointer;text-align:left;transition:background 0.15s}
.choice-btn:hover{background:#EBF0FA}
.progress{display:flex;gap:5px;margin-bottom:1rem}
.pip{height:4px;border-radius:2px;flex:1;background:#d1d5db;transition:background 0.3s}
.pip.done{background:#2D3F6B}
.pip.active{background:#6B88C2}
.result-card{background:#ffffff;border:1px solid #e0e2e8;border-radius:12px;padding:1.25rem;margin-left:38px}
.result-title{font-size:17px;font-weight:500;color:#1a1a2e;margin-bottom:4px}
.result-pathway{font-size:13px;color:#2D3F6B;font-weight:500;margin-bottom:1rem;padding:4px 10px;background:#EBF0FA;border-radius:6px;display:inline-block}
.section-label{font-size:11px;font-weight:500;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;margin:0.75rem 0 0.4rem}
.gap-list{list-style:none;display:flex;flex-direction:column;gap:6px;margin-bottom:0.5rem}
.gap-item{display:flex;align-items:flex-start;gap:8px;font-size:15px;line-height:1.45;color:#1a1a2e}
.gap-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot-warn{background:#BA7517}
.dot-ok{background:#1D9E75}
.dot-bad{background:#E24B4A}
.services-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0.75rem 0 1rem}
.svc-chip{padding:7px 10px;border-radius:8px;font-size:13px;border:1px solid #e0e2e8;color:#6b7280}
.svc-chip.active{background:#EBF0FA;border-color:#4A6399;color:#2D3F6B;font-weight:500}
.divider{height:1px;background:#e0e2e8;margin:1rem 0}
.cta-btn{display:block;padding:11px 20px;background:#2D3F6B;color:#E8EDF8;border-radius:8px;font-size:14px;font-weight:500;text-decoration:none;text-align:center;border:none;cursor:pointer;width:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.cta-btn:hover{background:#3d5490}
.typing{display:flex;gap:4px;align-items:center;padding:10px 14px;background:#ffffff;border:1px solid #e0e2e8;border-radius:12px;border-top-left-radius:4px;width:fit-content}
.dot-anim{width:6px;height:6px;border-radius:50%;background:#9ca3af;animation:bounce 1.2s infinite}
.dot-anim:nth-child(2){animation-delay:0.2s}
.dot-anim:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
</style>
</head>
<body>
<div class="chat-wrap" id="chatbox">
  <div class="brand">
    <div class="brand-dot">OAM</div>
    <div>
      <div class="brand-name">US Market Navigator</div>
      <div class="brand-sub">by OAM Partners — free assessment</div>
    </div>
  </div>
  <div class="progress" id="progress"></div>
  <div class="messages" id="messages"></div>
  <div id="input-area"></div>
</div>

<script>
function sendHeight(){
  const h=document.body.scrollHeight;
  window.parent.postMessage({iframeHeight:h},'*');
}
const ro=new ResizeObserver(()=>sendHeight());
ro.observe(document.body);

const TOTAL=7;
const questions=[
  {
    q:"Welcome! I'm the OAM Partners US Market Navigator.\n\nLet's assess your readiness to bring your medical device to the US market and show you exactly where OAM Partners can help.\n\nWhat type of device are you bringing?",
    choices:["Physical device (implant, instrument, equipment)","Software / digital health (app, AI, SaMD)","Combination (hardware + software)","Diagnostic / in vitro diagnostic (IVD)"]
  },
  {
    q:"Do you know your FDA device classification?",
    hint:"Class I = low risk (e.g. bandages, exam gloves). Class II = moderate risk (e.g. surgical tools, infusion pumps). Class III = high risk, life-sustaining (e.g. pacemakers, implantable cardiac devices).",
    choices:["Class I — low risk","Class II — moderate risk","Class III — high risk / life-sustaining","I'm not sure of my classification yet"]
  },
  {
    q:"What certifications or quality standards do you currently hold?",
    choices:["CE mark (EU) only","ISO 13485 quality management only","Both CE mark and ISO 13485","Neither yet"]
  },
  {
    q:"Have you set up your FDA establishment registration and appointed a US Agent?\n\nBoth are legally required before you can sell any medical device in the United States.",
    choices:["Yes — both are in place","US Agent appointed, but no FDA registration yet","No — neither in place yet","Not sure what these are"]
  },
  {
    q:"Has a similar version of your device already been approved and sold in the US market?\n\nThe FDA often allows faster approval if you can point to an existing, comparable device already on the US market. You don't need to know the technical details — just whether something similar exists.",
    hint:"Example: if you make a new type of knee brace, and knee braces are already sold in the US by other brands, that works in your favour.",
    choices:["Yes — similar devices are already sold in the US","We think so, but haven't confirmed it yet","No — our device is genuinely new to the US market","We're not sure"]
  },
  {
    q:"What is your primary target channel in the US market?",
    choices:["Hospital systems / IDNs","Ambulatory surgery centers (ASCs)","Specialty distributors","Direct to physician or clinic"]
  },
  {
    q:"Finally — which areas do you need the most help with?",
    choices:["Regulatory strategy and FDA clearance","US distribution and commercial launch","Finding US investors or raising capital","Clinical trials and study design","All of the above — full commercialization support"]
  }
];

const answers=[];
let step=0;

function buildProgress(){
  const bar=document.getElementById('progress');
  bar.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement('div');
    d.id='p'+i;
    d.className='pip'+(i<step?' done':i===step?' active':'');
    bar.appendChild(d);
  }
}

function addBotMsg(text,hint,withTyping){
  const msgs=document.getElementById('messages');
  if(withTyping){
    const t=document.createElement('div');
    t.className='msg';
    t.id='typing-row';
    t.innerHTML='<div class="avatar bot">OAM</div><div class="typing"><div class="dot-anim"></div><div class="dot-anim"></div><div class="dot-anim"></div></div>';
    msgs.appendChild(t);
    sendHeight();
    return new Promise(r=>setTimeout(()=>{t.remove();addBotMsg(text,hint,false);r();},850));
  }
  const row=document.createElement('div');
  row.className='msg';
  const hintHtml=hint?`<div class="hint">${hint}</div>`:'';
  row.innerHTML='<div class="avatar bot">OAM</div><div style="display:flex;flex-direction:column;gap:6px;max-width:88%"><div class="bubble bot">'+text.replace(/\n/g,'<br>')+'</div>'+hintHtml+'</div>';
  msgs.appendChild(row);
  sendHeight();
}

function addUserMsg(text){
  const msgs=document.getElementById('messages');
  const row=document.createElement('div');
  row.className='msg user';
  row.innerHTML='<div class="avatar user">You</div><div class="bubble user">'+text+'</div>';
  msgs.appendChild(row);
  sendHeight();
}

function showChoices(choices){
  const area=document.getElementById('input-area');
  area.innerHTML='';
  const wrap=document.createElement('div');
  wrap.className='choices';
  choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=c;
    btn.onclick=()=>handleChoice(c);
    wrap.appendChild(btn);
  });
  area.appendChild(wrap);
  sendHeight();
}

function handleChoice(choice){
  answers.push(choice);
  addUserMsg(choice);
  document.getElementById('input-area').innerHTML='';
  step++;
  buildProgress();
  if(step<questions.length){
    setTimeout(async()=>{
      const q=questions[step];
      await addBotMsg(q.q,q.hint||null,true);
      showChoices(q.choices);
    },200);
  } else {
    setTimeout(()=>showResult(),400);
  }
}

function getPathway(){
  const isSW=answers[0].includes('Software')||answers[0].includes('digital');
  const isIVD=answers[0].includes('IVD')||answers[0].includes('vitro');
  const isClassIII=answers[1].includes('Class III');
  const isClassI=answers[1].includes('Class I');
  const hasSimilar=answers[4].includes('Yes —');
  const isNovel=answers[4].includes('genuinely new');
  if(isSW) return 'SaMD / Software as a Medical Device pathway';
  if(isIVD) return '510(k) or De Novo for IVD devices';
  if(isClassIII) return 'Premarket Approval (PMA) — most rigorous pathway';
  if(isClassI) return '510(k) exempt — general controls only';
  if(hasSimilar) return '510(k) Premarket Notification (clearance)';
  if(isNovel) return 'De Novo classification request';
  return 'Pathway TBD — regulatory assessment recommended';
}

function buildGaps(){
  const gaps=[];
  const hasCE=answers[2].includes('CE')||answers[2].includes('Both');
  const hasISO=answers[2].includes('ISO')||answers[2].includes('Both');
  const hasReg=answers[3].includes('Yes — both');
  const hasAgent=answers[3].includes('US Agent appointed');
  const hasSimilar=answers[4].includes('Yes —');
  const thinksSimilar=answers[4].includes('think so');
  const isNovel=answers[4].includes('genuinely new');
  const isClassIII=answers[1].includes('Class III');
  const isUnsureClass=answers[1].includes('not sure');
  const channel=answers[5];
  if(isUnsureClass) gaps.push({cls:'dot-bad',text:'Device classification not yet confirmed — this is the first thing to establish before anything else'});
  if(isClassIII) gaps.push({cls:'dot-warn',text:'Class III devices require Premarket Approval (PMA) — the most rigorous FDA pathway, typically requiring clinical trial data'});
  if(hasCE) gaps.push({cls:'dot-ok',text:'CE mark in place — good foundation, though FDA requires its own independent evidence'});
  else gaps.push({cls:'dot-warn',text:'No CE mark — FDA will require standalone safety and performance data'});
  if(hasISO) gaps.push({cls:'dot-ok',text:'ISO 13485 certified — strong quality management foundation recognised in FDA submissions'});
  else gaps.push({cls:'dot-bad',text:'ISO 13485 not in place — required as part of your quality system for FDA clearance'});
  if(hasReg) gaps.push({cls:'dot-ok',text:'FDA establishment registration and US Agent confirmed — you are legally set up to sell once cleared'});
  else if(hasAgent) gaps.push({cls:'dot-warn',text:'US Agent appointed but FDA establishment registration still needed before you can sell'});
  else gaps.push({cls:'dot-bad',text:'Neither FDA registration nor US Agent in place — both required before your first US sale'});
  if(hasSimilar) gaps.push({cls:'dot-ok',text:'Similar devices already on the US market — 510(k) clearance pathway is likely available to you'});
  else if(thinksSimilar) gaps.push({cls:'dot-warn',text:'Potential comparable device exists but needs confirmation — this affects your entire FDA strategy'});
  else if(isNovel) gaps.push({cls:'dot-warn',text:'Novel device — De Novo or PMA pathway likely required; early FDA engagement is strongly recommended'});
  else gaps.push({cls:'dot-warn',text:'Unclear whether comparable devices exist in the US — market and regulatory research needed'});
  if(channel.includes('Hospital')) gaps.push({cls:'dot-warn',text:'Hospital / IDN channel requires GPO contracts, clinical evidence, and strong distributor relationships'});
  if(channel.includes('ASC')) gaps.push({cls:'dot-ok',text:'ASC channel is a strong entry point — faster decision cycles than hospital systems'});
  if(channel.includes('distributor')) gaps.push({cls:'dot-ok',text:'Specialty distributor route recommended as first step — OAM Partners has established US networks'});
  if(channel.includes('physician')) gaps.push({cls:'dot-ok',text:'Direct to physician channel — lean and fast for early-stage US commercialization'});
  return gaps;
}

function buildServices(){
  const need=answers[6];
  const isClassIII=answers[1].includes('Class III');
  const all=need.includes('All');
  return[
    {label:'Regulatory strategy',active:all||need.includes('Regulatory')},
    {label:'510(k) / PMA preparation',active:all||need.includes('Regulatory')||isClassIII},
    {label:'US distribution & launch',active:all||need.includes('distribution')},
    {label:'Distributor network placement',active:all||need.includes('distribution')},
    {label:'Investor introductions',active:all||need.includes('investor')||need.includes('capital')},
    {label:'Clinical trial design',active:all||need.includes('Clinical')||isClassIII},
    {label:'US Agent & FDA registration',active:true},
    {label:'Market entry strategy',active:true},
  ];
}

function showResult(){
  const msgs=document.getElementById('messages');
  const row=document.createElement('div');
  row.className='msg';
  row.innerHTML='<div class="avatar bot">OAM</div><div class="bubble bot">Thanks — here\'s your personalised US market readiness snapshot:</div>';
  msgs.appendChild(row);
  setTimeout(()=>{
    const card=document.createElement('div');
    card.className='result-card';
    const gapHtml=buildGaps().map(g=>`<li class="gap-item"><div class="gap-dot ${g.cls}"></div><span>${g.text}</span></li>`).join('');
    const svcHtml=buildServices().map(s=>`<div class="svc-chip${s.active?' active':''}">${s.label}</div>`).join('');
    card.innerHTML=`
      <div class="result-title">Recommended FDA pathway</div>
      <div class="result-pathway">${getPathway()}</div>
      <div class="section-label">Readiness checklist</div>
      <ul class="gap-list">${gapHtml}</ul>
      <div class="divider"></div>
      <div class="section-label">How OAM Partners can help</div>
      <div class="services-grid">${svcHtml}</div>
      <div class="divider"></div>
      <a class="cta-btn" href="https://oampartners.com/#contact" target="_blank">Talk to OAM Partners about your device</a>
    `;
    msgs.appendChild(card);
    document.getElementById('input-area').innerHTML='';
    for(let i=0;i<TOTAL;i++) document.getElementById('p'+i).className='pip done';
    sendHeight();
  },600);
}

buildProgress();
const q0=questions[0];
addBotMsg(q0.q,q0.hint||null,false);
showChoices(q0.choices);
</script>
</body>
</html>
